name: Polaris FixPR Test
on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  polaris-scan:
    runs-on: self-hosted
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Polaris Scan with FixPR
        uses: blackduck-inc/black-duck-security-scan@SIGINT-4621
        with:
            # Polaris Configuration
          polaris_server_url: ${{ vars.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_application_name: "e2e-fixpr-test"
          polaris_project_name: "e2e-fixpr-test"
          polaris_assessment_types: "SAST,SCA"
          polaris_waitForScan: true



          # # Test Locations
          # polaris_test_sast_location: "Remote"
          # polaris_test_sca_location: "Remote"

          bridgecli_download_url: "https://artifactory.tools.duckutil.net/artifactory/clops-local/integrations/bridge/binaries/bridge-cli-bundle/4.1.2rc1/bridge-cli-bundle-4.1.2rc1-win64.zip"

          # Polaris Fix PR Configuration
          polaris_fixpr_enabled: true
          polaris_fixpr_maxCount: 3
          # polaris_fixpr_useUpgradeGuidance: "SHORT_TERM,LONG_TERM"
          # polaris_fixpr_filter_by: "SEVERITIES"                                                                                                                     
          # polaris_fixpr_filter_severities: "BLOCKER"

          # GitHub Configuration
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # github_host_url: "https://github.com"
          # github_repository_owner: "jraob-testing"
          # github_repository_name: "nodegoat-polaris-test"
          # github_repository_branch: "main"

            # Diagnostics
          include_diagnostics: true
