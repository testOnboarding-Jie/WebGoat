# This is a basic workflow to help you get started with Actions

name: Integrations Scan

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: install java
        if: runner.os == 'Windows'
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Black Duck Action
        # You may pin to the exact commit or the version.
        uses: synopsys-sig/synopsys-action@main
        with:
          polaris_server_url: ${{secrets.POLARIS_SERVER_URL}}
          polaris_access_token: ${{secrets.POLARIS_ACCESS_TOKEN}}
          polaris_application_name: PolarisRapidSastHybrid
          polaris_project_name: PolarisRapidSastHybrid
          polaris_assessment_types: sast
          polaris_test_sast_location: hybrid
          polaris_test_sast_type: SAST-RAPID
          include_diagnostics: true
