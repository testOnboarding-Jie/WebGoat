# This is a basic workflow to help you get started with Actions

name: Integrations Scan

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: install java
        if: runner.os == 'Windows'
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Black Duck Action
        # You may pin to the exact commit or the version.
        uses: synopsys-sig/synopsys-action@main
        with:
          polaris_server_url: ${{secrets.POLARIS_SERVER_URL}}
          polaris_access_token: ${{secrets.POLARIS_ACCESS_TOKEN}}
          polaris_application_name: PolarisFixPrGitHubActionsTest
          polaris_project_name: PolarisFixPrGitHubActionsTest
          polaris_assessment_types: SAST,SCA
          polaris_fixpr_enabled: true
          polaris_fixpr_maxCount: 3
          bridgecli_download_url: https://artifactory.tools.duckutil.net/artifactory/clops-local/integrations/bridge/binaries/bridge-cli-bundle/4.1.2rc1/bridge-cli-bundle-4.1.2rc1-win64.zip
          polaris_waitForScan: true
          github_token: ${{secrets.GIT_PAT_TOKEN}}
